<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenVegas | Checkout Success</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ui/assets/theme.css?v=20260330" />
    <link rel="stylesheet" href="/ui/assets/layout.css?v=20260330" />
    <script defer src="/ui/assets/theme-fallback.js?v=20260330"></script>
  </head>
  <body>
    <nav class="top-nav">
      <a href="/ui" class="brand-link text-mono-sm">[ OPENVEGAS ]</a>
      <div id="siteNav" class="nav-links"><a href="/ui">Home</a><a href="/ui/how-it-works">How it works</a><a href="/ui/pricing">Pricing</a><a href="/ui/balance">Balance</a><a href="/ui/faq">FAQ</a><a href="/ui/how-to-play">HOW TO PLAY</a><a href="/ui/contact">Contact</a></div>
    </nav>

    <main class="container page-shell">
      <section class="card">
        <div class="text-mono-xs">PAYMENT STATUS</div>
        <h1 class="page-title">Checkout completed</h1>
        <p class="text-mono-sm page-lead">
          Your payment session completed. Final wallet settlement may take a few seconds while webhook delivery is processed.
        </p>
        <p id="sessionMeta" class="text-mono-sm"></p>
        <div class="cta-row">
          <a class="btn btn-primary" href="/ui/balance">Open balance</a>
          <a class="btn" href="/ui/transactions">Open transactions</a>
          <a class="btn" href="/ui/topup-checkout">Back to top-up</a>
        </div>
      </section>
    </main>

    <script type="module">
      import { renderTopNav, installAssetGuard, byId } from "/ui/assets/site.js?v=20260330";
      installAssetGuard();
      renderTopNav("siteNav");

      const params = new URLSearchParams(window.location.search);
      const sid = params.get("session_id");
      if (sid) {
        byId("sessionMeta").textContent = `checkout_session_id=${sid}`;
      }
    </script>
  </body>
</html>
