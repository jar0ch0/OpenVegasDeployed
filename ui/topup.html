<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenVegas | Top-up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ui/assets/theme.css" />
    <link rel="stylesheet" href="/ui/assets/layout.css" />
    <style>
      .topup-root { padding: 2rem 0 3rem; }
      .topup-header { padding: 1.4rem; margin-bottom: 1rem; }
      .topup-grid { display: grid; grid-template-columns: 1fr 320px; gap: 1rem; }
      .checkout-link { display:inline-block; margin-top:.5rem; word-break: break-all; color: var(--aqua); }
      .qr { width: min(300px, 80vw); background:#fff; padding:8px; border-radius:8px; }
      .state-copy { margin-top: .7rem; color: var(--grey-light); font-family: var(--font-mono); font-size: 11px; line-height: 1.5; }
      .failure { margin-top: .8rem; color: var(--bad); font-family: var(--font-mono); font-size: 11px; }
      @media (max-width: 900px){ .topup-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <nav class="top-nav">
      <a href="/ui" class="brand-link text-mono-sm">[ OPENVEGAS ]</a>
      <div style="display:flex; align-items:center; gap:14px;">
        <div id="siteNav" class="nav-links"></div>
        <div id="founderLinks" class="founder-links"></div>
      </div>
    </nav>

    <main class="container topup-root">
      <section class="card topup-header">
        <div class="text-mono-xs">BILLING · TOP-UP</div>
        <h1 class="card-title" style="margin-bottom:.3rem;">Checkout status</h1>
        <p id="meta" class="text-mono-sm">Loading top-up details...</p>
        <div id="statusPill" class="status-pill">unknown</div>
      </section>

      <section class="topup-grid">
        <article class="card" style="padding:1rem; min-height:260px;">
          <div class="text-mono-xs">COMPLETE FUNDING</div>
          <p class="card-copy">Use this secure checkout to fund your OpenVegas balance.</p>
          <a id="checkoutLink" class="checkout-link" href="#" target="_blank" rel="noreferrer" hidden></a>
          <p id="stateCopy" class="state-copy">Payment created. Complete checkout to finish funding.</p>
          <p id="failureReason" class="failure" hidden></p>
          <div class="cta-row" style="margin-top:1rem;">
            <a id="loginLink" class="btn btn-primary" href="/ui/login">OpenVegas login</a>
            <a id="balanceLink" class="btn" href="/ui/balance#payments">Open balance</a>
          </div>
        </article>

        <article class="card" style="padding:1rem; min-height:260px;">
          <div class="text-mono-xs">SCAN TO CONTINUE</div>
          <img id="qrImage" class="qr" alt="Top-up checkout QR" hidden />
        </article>
      </section>
    </main>

    <script type="module">
      import { renderTopNav, renderFounderLinks, installAssetGuard } from "/ui/assets/site.js";
      import { loadTopup } from "/ui/assets/topup.js";
      installAssetGuard();
      renderTopNav("siteNav");
      renderFounderLinks("founderLinks");
      loadTopup();
    </script>
  </body>
</html>
