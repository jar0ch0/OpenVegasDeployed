name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            sha_cmd: sha256sum
          - os: macos-latest
            target: darwin-arm64
            sha_cmd: shasum -a 256
          - os: windows-latest
            target: win-x64
            sha_cmd: pwsh

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install pyinstaller

      - name: Build binary (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: bash scripts/build-binary.sh ${{ matrix.target }}

      - name: Build binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: bash scripts/build-binary.sh ${{ matrix.target }}

      - name: Generate checksum (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: ${{ matrix.sha_cmd }} dist/openvegas-${{ matrix.target }} > dist/openvegas-${{ matrix.target }}.sha256

      - name: Generate checksum (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist\openvegas-${{ matrix.target }}.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  openvegas-${{ matrix.target }}.exe" | Out-File -FilePath "dist\openvegas-${{ matrix.target }}.exe.sha256" -Encoding ascii

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openvegas-${{ matrix.target }}
          path: dist/openvegas-${{ matrix.target }}*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find artifacts -type f | xargs -I{} cp {} release-assets/
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/openvegas-*
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
