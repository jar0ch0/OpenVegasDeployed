name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server,dev]"

      - name: Contract boundary checks
        run: |
          python scripts/ci/check_callback_replay_boundary.py
          python scripts/ci/check_tool_request_immutability.py

      - name: Run tests
        run: |
          pytest -q
