name: Publish npm Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      expected_tag:
        description: Optional tag to verify against package version, e.g. v0.1.1
        required: false
        type: string

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify release tag matches npm package version
        working-directory: npm-cli
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="${{ github.event_name == 'release' && github.ref_name || github.event.inputs.expected_tag }}"
          if [ -z "${EXPECTED_TAG}" ]; then
            EXPECTED_TAG="v${PACKAGE_VERSION}"
          fi
          if [ "v${PACKAGE_VERSION}" != "${EXPECTED_TAG}" ]; then
            echo "Expected tag ${EXPECTED_TAG} does not match npm package version v${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Preview package contents
        working-directory: npm-cli
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: npm-cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
